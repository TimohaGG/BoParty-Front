@if (currentUser) {
  <section class="page-shell profile-page">
    <header class="page-header">
      <div>
        <h1 class="page-title">Профіль</h1>
        <p class="page-subtitle">Дані користувача та доступи.</p>
      </div>
    </header>

    <div class="profile-card content-panel">
      <div>
        <span class="label">Користувач</span>
        <strong>{{ currentUser.username }}</strong>
      </div>
      <div>
        <span class="label">Email</span>
        <strong>{{ currentUser.email }}</strong>
      </div>
      <div>
        <span class="label">Ролі</span>
        <div class="roles">
          @for (role of currentUser.roles; track role) {
            <span>{{ role }}</span>
          }
        </div>
      </div>
    </div>
  </section>
} @else {
  <div class="empty-state content-panel">Будь ласка, увійдіть.</div>
}
