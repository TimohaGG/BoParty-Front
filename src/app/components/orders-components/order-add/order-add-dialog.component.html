<div class="bo-dialog bo-dialog-wide">
  <header class="bo-dialog-header">
    <h2>Додати фінансовий запис</h2>
    <p>Заповніть витрати та суму для вибраного замовлення.</p>
  </header>

  <mat-dialog-content class="bo-dialog-content">
    <form class="bo-dialog-form">
      <mat-form-field>
        <mat-label>Меню</mat-label>
        <mat-select [ngModel]="menu()" (ngModelChange)="menu.set($event)" name="menu">
          @for (menuItem of menus(); track menuItem.id) {
            <mat-option [value]="menuItem.id">{{menuItem.client}} - {{menuItem.date}}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <div class="bo-dialog-grid">
        <mat-form-field>
          <mat-label>Закупівля</mat-label>
          <input matInput name="shoppingSum" type="number" />
        </mat-form-field>

        <mat-form-field>
          <mat-label>Дата</mat-label>
          <input matInput name="date" type="date" />
        </mat-form-field>

        <mat-form-field>
          <mat-label>Персонал</mat-label>
          <input matInput name="staffSum" type="number" />
        </mat-form-field>

        <mat-form-field>
          <mat-label>Податок</mat-label>
          <input matInput name="tax" type="number" />
        </mat-form-field>
      </div>

      <mat-form-field>
        <mat-label>Сума замовлення</mat-label>
        <input matInput name="orderSum" type="number" />
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions class="bo-dialog-actions">
    <button mat-button (click)="onNoClick()">Скасувати</button>
    <button mat-flat-button color="accent" [mat-dialog-close]="menu()" cdkFocusInitial>Зберегти</button>
  </mat-dialog-actions>
</div>
