<div class="container p-3 d-flex flex-column justify-content-center">

  <h2>Додати інгридієнт</h2>

  <mat-dialog-content>
    <mat-form-field class="w-100 mb-2">
      <mat-label>
        Назва категорії
      </mat-label>
      <input matInput [(ngModel)]="name"/>
    </mat-form-field>

    <mat-form-field class="w-100 ">
      <mat-label>
        Категорія
      </mat-label>
      <mat-select [(ngModel)]="selected">
        @for (opt of categories();track $index){
          <mat-option [value]="opt.id">{{opt.name}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button (click)="onClose()">Скасувати</button>
    <button mat-button (click)="onSubmit()">Додати</button>
  </mat-dialog-actions>

</div>
