<div class="bo-dialog">
  <header class="bo-dialog-header">
    <h2>Видалити категорію?</h2>
    <p>Цю дію не можна буде скасувати.</p>
  </header>

  <mat-dialog-content class="bo-dialog-content">
    <div class="bo-danger-box">
      Ви дійсно хочете видалити "{{data.name}}"?
    </div>
  </mat-dialog-content>

  <mat-dialog-actions class="bo-dialog-actions">
    <button mat-button (click)="onClose()">Ні</button>
    <button mat-flat-button class="bo-danger-action" (click)="onSubmit()">Так, видалити</button>
  </mat-dialog-actions>
</div>
