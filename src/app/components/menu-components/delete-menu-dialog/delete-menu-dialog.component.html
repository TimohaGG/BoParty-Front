<div class="bo-dialog">
  <header class="bo-dialog-header">
    <h2>Видалити замовлення?</h2>
    <p>Перевірте деталі перед видаленням.</p>
  </header>

  <mat-dialog-content class="bo-dialog-content">
    <div class="bo-dialog-summary">
      <div class="bo-dialog-summary-row">
        <span>Дата</span>
        <strong>{{data.date}}</strong>
      </div>
      <div class="bo-dialog-summary-row">
        <span>Замовник</span>
        <strong>{{data.client}}</strong>
      </div>
      <div class="bo-dialog-summary-row">
        <span>Сума</span>
        <strong>{{data.price}}</strong>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions class="bo-dialog-actions">
    <button mat-stroked-button mat-dialog-close>Скасувати</button>
    @if (loading) {
      <mat-spinner [diameter]="28"></mat-spinner>
    } @else {
      <button mat-flat-button class="bo-danger-action" (click)="onDeleteConfirm()">Видалити</button>
    }
  </mat-dialog-actions>
</div>
