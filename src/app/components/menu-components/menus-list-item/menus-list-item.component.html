@if (menu) {
  <article class="order-row">
    <div class="order-main">
      @if(menu.temporary){
        <div>
          <span class="eyebrow">Об`єднано з дат</span>
          <h2>{{menu.client}}</h2>
        </div>
      }@else{
        <div>
          <span class="eyebrow">Дата події</span>
          <h2>{{menu.date}}</h2>
          @if(menu.client && menu.client.trim()){
            <p class="client-name">{{menu.client}}</p>
          }
        </div>
      }


      <div class="order-price">
        <span class="eyebrow">Сума</span>
        <strong>{{menu.totalPrice}} грн</strong>
      </div>
      <button
        mat-icon-button
        class="paid-button"
        [ngClass]="menu.payed ? 'full' : 'empty'"
        (click)="toggleFavourite()"
        [attr.aria-label]="menu.payed ? 'Позначено як оплачено' : 'Позначити як оплачено'"
        [title]="menu.payed ? 'Оплачено' : 'Не оплачено'">
        <mat-icon>{{menu.payed ? 'paid' : 'payments'}}</mat-icon>
      </button>
    </div>

    <div class="control-buttons" aria-label="Дії із замовленням">
      <button mat-stroked-button class="control-button" (click)="downloadMenu(menu.id)">
        <mat-icon>download</mat-icon>
        <span>PDF</span>
      </button>
      <button mat-stroked-button class="control-button" routerLinkActive [routerLink]="['/service/orders/new']" [queryParams]="{orderId:menu.id}">
        <mat-icon>edit</mat-icon>
        <span>Редагувати</span>
      </button>
      <button mat-icon-button class="shopping-button" aria-label="Закупівлі" title="Закупівлі" [routerLink]="['/service/orders', menu.id, 'shopping']">
        <mat-icon>shopping_cart</mat-icon>
      </button>
      <button mat-icon-button class="copy-button" aria-label="Копіювати" title="Копіювати" (click)="copyMenu(menu.id)">
        <mat-icon>content_copy</mat-icon>
      </button>
      <button mat-icon-button class="delete-button" aria-label="Видалити" title="Видалити" (click)="openDeleteDialog()">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </article>
}
