<div class="bo-dialog bo-dialog-wide shopping-join-dialog">
  <header class="bo-dialog-header">
    <h2>Об`єднати замовлення</h2>
    <p>Оберіть замовлення, які потрібно звести в одну спільну закупівлю.</p>
  </header>

  <mat-dialog-content class="bo-dialog-content">
    <div class="shopping-join-form">
      <div class="shopping-join-hint">
        Виберіть кілька замовлень зі списку нижче.
      </div>

      <mat-form-field class="shopping-join-field">
        <mat-label>Замовлення</mat-label>
        <mat-select [(ngModel)]="selected" multiple>
          @for (ord of ordersList; track ord.id) {
            <mat-option [value]="ord.id">{{ord.date | date}} | {{ord.client}} | {{ord.totalPrice}}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions class="bo-dialog-actions shopping-join-actions">
    <button mat-button (click)="close()">Скасувати</button>
    @if(this.loading){
      <button mat-flat-button color="accent" disabled>
        <mat-spinner diameter="18"></mat-spinner>
      </button>
    }
    @else{
      <button mat-flat-button color="accent" (click)="onSubmit()">Об`єднати</button>
    }
  </mat-dialog-actions>
</div>
