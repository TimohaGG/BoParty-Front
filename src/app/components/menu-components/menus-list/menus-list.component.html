
<div class="d-flex justify-content-center align-items-center">

  @if (this.needsArchive){
    <h3 class="text-center">Архів</h3>
  }
  @else{
    <h3 class="text-center">Замовлення</h3>
  }

  <button [routerLink]="'/order/create'" [queryParams]="{editable:true}" class="btn btn-outline-light mx-4">
    <mat-icon style="color:white">
      add
    </mat-icon>
  </button>
</div>



@if(menus().length ==0 && !loadingFailure){
  <mat-spinner color="accent"></mat-spinner>
}
@if(loadingFailure){
  <h5 class="text-center mt-3">Здається тут пусто :(</h5>
}
@else{
  <div class="orders-list d-flex flex-column justify-content-center align-items-center mt-3">
    @if(menus().length>0){
      @for (item of menus();track $index){
        <app-orders-list-item [menu]="item"></app-orders-list-item>
      }
    }
  </div>

  <mat-paginator
    class="mt-3"
    [length]="totalPages()"
    [pageIndex]="currentPage()"
    [pageSize]="perPage()"
    [pageSizeOptions]="[5,10,25]"
    (page)="onPageChange($event)"
    aria-label="Select Page">

  </mat-paginator>




}
<button [matMenuTriggerFor]="menu" mat-fab class="menu-button">
  <mat-icon>more_vert</mat-icon>
</button>


<mat-menu #menu="matMenu">
  <button mat-menu-item [routerLink]="'/order/create'">Нове замовлення</button>
  <button mat-menu-item>Об`єднати</button>
</mat-menu>
