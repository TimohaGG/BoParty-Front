<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="over" class="sidenav" position="end" #sidenav [(opened)]="opened">
    <mat-toolbar class="sidenav-title">Catering.smm</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item class="side-nav-item" routerLink="/service/orders" routerLinkActive="active-link" (click)="sidenav!.close()" [routerLinkActiveOptions]="{exact:true}">
        <mat-icon class="side-nav-icon" matListItemIcon>event_note</mat-icon>
        <span class="side-nav-label">Замовлення</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/service/orders" routerLinkActive="active-link" (click)="sidenav!.close()" [queryParams]="{showArchive:true}">
        <mat-icon class="side-nav-icon" matListItemIcon>archive</mat-icon>
        <span class="side-nav-label">Архів</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/service/positions" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>restaurant_menu</mat-icon>
        <span class="side-nav-label">Позиції</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/service/ingredients" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>inventory_2</mat-icon>
        <span class="side-nav-label">Інгредієнти</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/service/waiters" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>groups</mat-icon>
        <span class="side-nav-label">Офіціанти</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/service/profile" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>person</mat-icon>
        <span class="side-nav-label">Профіль</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/service/reports/orders" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>bar_chart</mat-icon>
        <span class="side-nav-label">Статистика</span>
      </a>
      @if (isLoggedIn) {
        <button mat-list-item class="side-nav-item side-nav-logout" type="button" (click)="logout()">
          <mat-icon class="side-nav-icon" matListItemIcon>logout</mat-icon>
          <span class="side-nav-label">Вийти</span>
        </button>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="topbar">
      <div class="brand">
        <img [src]="brandLogoSrc" alt="" (error)="onLogoError()" />
        <span>{{username || 'Catering.smm'}}</span>
      </div>
      @if (isLoggedIn) {
      <nav class="desktop-nav" aria-label="Main navigation">
        <a mat-button routerLink="/service/orders" routerLinkActive="active-top-link" [routerLinkActiveOptions]="{exact:true}">Замовлення</a>
        <a mat-button routerLink="/service/orders" routerLinkActive="active-top-link" [queryParams]="{showArchive:true}">Архів</a>
        <a mat-button routerLink="/service/positions" routerLinkActive="active-top-link">Позиції</a>
        <a mat-button routerLink="/service/ingredients" routerLinkActive="active-top-link">Інгредієнти</a>
        <a mat-button routerLink="/service/waiters" routerLinkActive="active-top-link">Офіціанти</a>
        <a mat-button routerLink="/service/reports/orders" routerLinkActive="active-top-link">Статистика</a>
        <button mat-button class="logout-button" type="button" (click)="logout()">Вийти</button>
      </nav>
      <button mat-icon-button class="mobile-menu-button" aria-label="Відкрити меню" (click)="sidenav.toggle()" >
        <mat-icon>menu</mat-icon>
      </button>
      }
    </mat-toolbar>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
