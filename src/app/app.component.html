<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="over" class="sidenav" position="end" #sidenav [(opened)]="opened">
    <mat-toolbar class="sidenav-title">Bo Party</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item class="side-nav-item" routerLink="/home" routerLinkActive="active-link" (click)="sidenav!.close()" [routerLinkActiveOptions]="{exact:true}">
        <mat-icon class="side-nav-icon" matListItemIcon>event_note</mat-icon>
        <span class="side-nav-label">Замовлення</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/home" routerLinkActive="active-link" (click)="sidenav!.close()" [queryParams]="{showArchive:true}">
        <mat-icon class="side-nav-icon" matListItemIcon>archive</mat-icon>
        <span class="side-nav-label">Архів</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/positions" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>restaurant_menu</mat-icon>
        <span class="side-nav-label">Позиції</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/ingredients" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>inventory_2</mat-icon>
        <span class="side-nav-label">Інгредієнти</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/profile" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>person</mat-icon>
        <span class="side-nav-label">Профіль</span>
      </a>
      <a mat-list-item class="side-nav-item" routerLink="/order/data" routerLinkActive="active-link" (click)="sidenav!.close()">
        <mat-icon class="side-nav-icon" matListItemIcon>bar_chart</mat-icon>
        <span class="side-nav-label">Статистика</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="topbar">
      <div class="brand">
        <img src="/assets/img/logo.png" alt="" />
        <span>Bo Party</span>
      </div>
      <nav class="desktop-nav" aria-label="Main navigation">
        <a mat-button routerLink="/home" routerLinkActive="active-top-link" [routerLinkActiveOptions]="{exact:true}">Замовлення</a>
        <a mat-button routerLink="/home" routerLinkActive="active-top-link" [queryParams]="{showArchive:true}">Архів</a>
        <a mat-button routerLink="/positions" routerLinkActive="active-top-link">Позиції</a>
        <a mat-button routerLink="/ingredients" routerLinkActive="active-top-link">Інгредієнти</a>
        <a mat-button routerLink="/order/data" routerLinkActive="active-top-link">Статистика</a>
      </nav>
      @if (isLoggedIn) {
        <button mat-button class="logout-button" (click)="logout()">Вийти</button>
      }
      <button mat-icon-button class="mobile-menu-button" aria-label="Відкрити меню" (click)="sidenav.toggle()" >
        <mat-icon>menu</mat-icon>
      </button>
    </mat-toolbar>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
